name: Labi News & Daily Survey Launcher 🐰🚀

on:
  push:
    branches:
      - main
  schedule:
    # 30分に1回実行らびっ！ 🐰🚀
    # (JST 02:00-04:00 以外)
    - cron: '0,30 0-16,20-23 * * *'
  workflow_dispatch: # 手動実行も可能らび！

permissions:
  contents: write

jobs:
  post-survey:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
      VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies 📦
        run: npm install

      - name: Run Auto News Poster Script 🥕
        run: node scripts/auto_latest_news.cjs

      - name: Generate Sitemap 🗺️
        run: node scripts/generate_sitemap.cjs

      - name: Commit and Push Sitemap 🚀
        run: |
          git config --global user.name "Labi Bot"
          git config --global user.email "labi-bot@users.noreply.github.com"
          git add public/sitemap.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update sitemap [skip ci]" && git push)
