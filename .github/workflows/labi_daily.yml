name: Labi News & Daily Survey Launcher 🐰🚀

on:
  schedule:
    # 毎日 8:00, 12:00, 20:00 JST (UTC 23:00, 3:00, 11:00) に実行らびっ！
    - cron: '0 23,3,11 * * *'
  workflow_dispatch: # 手動実行も可能らび！

permissions:
  contents: read

jobs:
  post-survey:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
      VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Auto News Poster Script 🥕
        run: node scripts/auto_latest_news.cjs
